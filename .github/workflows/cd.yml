name: CD - Pubblicazione immagine

# Si attiva SOLO quando il workflow "Security" termina
on:
  workflow_run:
    workflows: ['Security']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build-scan-push:
    name: Build immagine hardened, gate Trivy e push su DockerHub
    runs-on: ubuntu-latest
    # Pubblica solo se: la Security è passata, era un push sul branch master.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/node-express-boilerplate
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Builda esattamente il commit che ha superato la Security
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build immagine hardened (locale, senza push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GATE di sicurezza: se Trivy trova vulnerabilita' HIGH/CRITICAL (fixabili)
      # nell'immagine, il job fallisce e il push NON avviene.
      - name: Gate - scansione immagine con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: app:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '1'

      - name: Login a DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Pubblica la STESSA immagine già scansionata (tag :latest e :<sha>)
      - name: Tag e push su DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag app:scan "$IMAGE:latest"
          docker tag app:scan "$IMAGE:$SHA"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA"

      - name: Avviso se i secret DockerHub non sono configurati
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "::notice::Secret DOCKERHUB_USERNAME/DOCKERHUB_TOKEN non configurati - gate di sicurezza eseguito, push saltato."
